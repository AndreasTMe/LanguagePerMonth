name: workers
version: 0.1.0.0
license: UNLICENSED

extra-source-files:
    - README.md

dependencies:
    - base >= 4.7 && < 5
    - async
    - containers
    - random
    - stm
    - time
    - unliftio

ghc-options:
    - -Wall
    - -Wcompat
    - -Widentities
    - -Wincomplete-record-updates
    - -Wincomplete-uni-patterns
    - -Wmissing-export-lists
    - -Wmissing-home-modules
    - -Wpartial-fields
    - -Wredundant-constraints

library:
    source-dirs: src
    exposed-modules:
        - Behaviour
        - Configuration
        - ExecutionModel
        - Work
        - Worker
    dependencies:
        - containers

executables:
    workers:
        main: Main.hs
        source-dirs: app
        ghc-options:
            - -threaded
            - -rtsopts
            - -with-rtsopts=-N
        dependencies:
            - workers
